      <h2>Formulario de Solicitud Turística</h2>

    <form action="pag.principal.html" method="post">
        
        <label for="nombre">Nombre Completo:</label>
        <br>
        <input type="text" id="nombre" placeholder="Ingrese su nombre">
        <br><br>

        <label for="correo">Correo Electrónico:</label>
        <br>
        <input type="email" id="correo" placeholder="@gmail.com">
        <br><br>

        <label for="pais">País de Origen:</label>
        <br>
        <input type="text" id="pais" placeholder="ej:Brasil">
        <br><br>

        <label for="destino">Destino de Interés:</label>
        <br>
        <select id="destino" name="destino">
            <option value="Salar de Uyuni">Salar de Uyuni</option>
            <option value="Lago Titicaca">Lago Titicaca</option>
            <option value="Tiwanaku">Tiwanaku</option>
            
        </select>
        <br><br>

        <label for="personas">Número de Personas:</label><br>
        <input type="number" id="personas" name="personas" min="1" required>
        <br><br>

        <label for="comentarios">Comentarios:</label>
        <br>
        <textarea id="comentarios" name="comentarios" rows="4" cols="40"></textarea>
        <br><br>

        <input type="submit" value="Enviar">
        <input type="reset" value="Borrar">

    </form>

</body>
</html>
